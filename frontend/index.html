<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Agri Advisor - Intelligent Crop Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        :root {
            /* REDUCED NOISE INTENSITY FOR BETTER CLARITY */
            --noise-opacity: 0.04;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            position: relative;
            min-height: 100vh;
        }

        /* High-Fidelity Noise Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/noise.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: var(--noise-opacity);
            pointer-events: none;
            z-index: -1;
        }

        /* Sophisticated Radial Gradients - Reduced for clarity */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 65%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 65%),
                radial-gradient(at 50% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 60%);
            pointer-events: none;
            z-index: -2;
        }

        .font-heading {
            font-family: 'Playfair+Display', serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }

        #map-container {
            height: 500px;
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: #f1f5f9;
            /* Slate-100 */
        }

        /* Custom emerald map marker */
        .emerald-marker {
            color: #10b981;
            font-size: 2.5rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Map Mask (Outside India) */
        .map-mask-layer {
            fill: #0f172a;
            fill-opacity: 0.6;
            stroke: none;
            pointer-events: none;
        }

        /* Accurate & Visually Distinct India Boundary */
        .india-boundary-glow {
            fill: rgba(16, 185, 129, 0.08);
            stroke: #10b981;
            stroke-width: 3;
            stroke-dasharray: 8, 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
            filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.8));
            animation: dash 30s linear infinite, glow 4s ease-in-out infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 1000;
            }
        }

        @keyframes glow {

            0%,
            100% {
                stroke-opacity: 1;
                filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.8));
            }

            50% {
                stroke-opacity: 0.6;
                filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4));
            }
        }

        .leaflet-container {
            background-color: transparent !important;
        }

        /* Custom Leaflet Tooltip */
        .leaflet-tooltip-agro {
            background: #064e3b !important;
            border: 1px solid #10b981 !important;
            color: white !important;
            font-weight: 800 !important;
            border-radius: 12px !important;
            padding: 4px 12px !important;
            font-size: 10px !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2) !important;
        }

        /* Premium Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 10px;
            border: 3px solid #f1f5f9;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #059669;
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: #10b981 #f1f5f9;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>

<body class="bg-stone-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
